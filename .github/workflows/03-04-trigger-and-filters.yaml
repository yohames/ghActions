name: Triggering Events

on:
    push:
        branches:
            - "example-branch/*"
            - "release/*"
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
        paths:
            - "03-pr-filter/filters/*.md"
            - "!03-pr-filter/filters/*.txt"
    workflow_dispatch:

jobs:
    echo-event:
        runs-on: ubuntu-24.04
        steps:
            - name: Dump full event JSON
              run: |
                echo "=== $GITHUB_EVENT_NAME payload ==="
                cat "$GITHUB_EVENT_PATH"



# `release/1.0` is valid as long as you do not already have a branch named `release` (same conflict rule you just hit with `example-branch`).

# Create it with:

# ```bash
# git switch -c release/1.0
# git push -u origin release/1.0
# ```

# If you want it based on `main` explicitly:

# ```bash
# git switch -c release/1.0 main
# git push -u origin release/1.0
# ```

# Quick check for conflict first:

# ```bash
# git show-ref --verify --quiet refs/heads/release && echo "branch 'release' exists"
# ```