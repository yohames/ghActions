name: Artifacts

on:
    workflow_dispatch:

jobs:
    artifact-creator-job:
        runs-on: ubuntu-latest
        steps:
            - name: Create artifact
              run: |
                echo "This is some content for the artifact" > af1.txt
                echo "Another line of content" >> af1.txt
            - name: Upload artifact
              uses: actions/upload-artifact@v7
              with:
                  name: my-artifact
                  path: af1.txt
    artifact-consumer-job:
        runs-on: ubuntu-latest
        needs: artifact-creator-job
        steps:
            - name: Download artifact
              uses: actions/download-artifact@v3
              with:
                  name: my-artifact
            - name: Show artifact content
              run: |
                echo "Content of the artifact:"
                cat af1.txt