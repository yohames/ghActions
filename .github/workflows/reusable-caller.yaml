name: Reusable Workflow Caller is here check it🚀🚀🚀🚀

on:
    workflow_dispatch:

jobs:
    call_reusable_workflow:
        runs-on: ubuntu-latest
        steps:
          - name: Call reusable workflow
            uses: ./.github/workflows/reusable.yaml
            with:
              config-path: "😹path/to/config.yaml"




