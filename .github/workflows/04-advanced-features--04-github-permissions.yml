name: Permissions

on:
    workflow_dispatch:

jobs:
    read-only-job:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        continue-on-error: true
        steps:
            - uses: actions/checkout@v6 #downloads your repository into the runner workspace.
            - name: Attempt to create a file
              run: |
                echo "This will fail due to insufficient permissions" > new-file.txt
                cat new-file.txt
    read-write-job:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v6 #downloads your repository into the runner workspace.
            - name: Create a file
              run: |
                echo "This will succeed due to sufficient permissions" > written-file.txt
                cat written-file.txt